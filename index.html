<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PRO MAX AI BOT</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  padding-bottom:90px;
}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  color:#00ff9d;
}

#chart{height:320px;}

.panel{padding:10px;}

.card{
  background:#0f172a;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.bottom-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f172a;
  display:flex;
  gap:6px;
  padding:10px;
}

select,button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

.analyze{background:#00c853;}
.auto{background:#2979ff;}
</style>
</head>

<body>

<div class="header">🚀 PRO MAX AI BOT</div>

<div id="chart"></div>

<div class="panel">
<div class="card">Signal <span id="signal">--</span></div>
<div class="card">RSI <span id="rsi">--</span></div>
<div class="card">Trend <span id="trend">--</span></div>
<div class="card">Entry <span id="entry">--</span></div>
<div class="card">TP <span id="tp">--</span></div>
<div class="card">SL <span id="sl">--</span></div>
</div>

<div class="bottom-bar">
<select id="symbol">
<option value="R_10">R_10</option>
<option value="R_25">R_25</option>
<option value="R_50">R_50</option>
<option value="R_75">R_75</option>
<option value="R_100">R_100</option>
<option value="BOOM500">Boom 500</option>
<option value="BOOM1000">Boom 1000</option>
<option value="CRASH500">Crash 500</option>
<option value="CRASH1000">Crash 1000</option>
</select>

<button class="analyze" onclick="analyze()">تحليل</button>
<button class="auto" onclick="toggleAuto()" id="autoBtn">AUTO ON</button>
</div>

<script>

// ===== STATE =====
let symbol="R_100";
let ws;
let candles=[];
let prices=[];
let auto=true;
let lastAnalysis=0;

// ===== CHART =====
const chart = LightweightCharts.createChart(document.getElementById('chart'),{
  layout:{background:{color:"#020617"},textColor:"#aaa"}
});
const series = chart.addCandlestickSeries();

// ===== CONNECT =====
function connect(){

  if(ws) ws.close();

  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {

    ws.send(JSON.stringify({
      ticks_history: symbol,
      style:"candles",
      granularity:60,
      count:100,
      end:"latest"
    }));

    ws.send(JSON.stringify({
      ohlc:symbol,
      granularity:60,
      subscribe:1
    }));
  };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if(d.history){
      candles = d.history.times.map((t,i)=>({
        time:t,
        open:d.history.open[i],
        high:d.history.high[i],
        low:d.history.low[i],
        close:d.history.close[i]
      }));

      prices = candles.map(c=>c.close);
      series.setData(candles);
    }

    if(d.ohlc){
      const c = d.ohlc;

      const candle = {
        time:c.epoch,
        open:c.open,
        high:c.high,
        low:c.low,
        close:c.close
      };

      const last = candles.at(-1);

      if(last && last.time === candle.time){
        candles[candles.length-1] = candle;
      }else{
        candles.push(candle);
      }

      series.update(candle);

      prices.push(candle.close);
      if(prices.length>200) prices.shift();

      if(auto && Date.now()-lastAnalysis>1000){
        analyze();
        lastAnalysis = Date.now();
      }
    }
  };

  ws.onclose = () => setTimeout(connect,2000);
}

// ===== RSI (WILDER) =====
function RSI(period=14){
  if(prices.length < period+1) return null;

  let gains=0, losses=0;

  for(let i=1;i<=period;i++){
    let diff = prices.at(-i) - prices.at(-i-1);
    if(diff>0) gains+=diff;
    else losses-=diff;
  }

  let rs = gains/(losses||1);
  return 100 - (100/(1+rs));
}

// ===== EMA =====
function EMA(period){
  if(prices.length < period) return null;

  let k = 2/(period+1);
  let ema = prices[prices.length-period];

  for(let i=prices.length-period+1;i<prices.length;i++){
    ema = prices[i]*k + ema*(1-k);
  }

  return ema;
}

// ===== SPIKE =====
function detectSpike(){
  if(prices.length < 30) return false;

  let moves=[];
  for(let i=1;i<30;i++){
    moves.push(Math.abs(prices.at(-i)-prices.at(-i-1)));
  }

  let avg = moves.reduce((a,b)=>a+b,0)/moves.length;
  let lastMove = Math.abs(prices.at(-1)-prices.at(-2));

  return lastMove > avg*2;
}

// ===== ANALYZE =====
function analyze(){

  if(prices.length < 50) return;

  const rsi = RSI();
  const ema20 = EMA(20);
  const ema50 = EMA(50);
  const last = prices.at(-1);

  document.getElementById("rsi").innerText = rsi ? rsi.toFixed(1) : "--";

  let trend="SIDE";
  if(ema20>ema50) trend="UP";
  else if(ema20<ema50) trend="DOWN";

  document.getElementById("trend").innerText = trend;

  let signal="WAIT";
  let spike = detectSpike();

  if(!spike){
    if(rsi<40 && trend==="UP") signal="BUY 🚀";
    else if(rsi>60 && trend==="DOWN") signal="SELL 🔻";
  }

  document.getElementById("signal").innerText =
    spike ? "⚡ SPIKE قريب" : signal;

  if(signal==="WAIT") return;

  let entry=last;
  let tp=entry+2;
  let sl=entry-1.5;

  if(signal.includes("SELL")){
    tp=entry-2;
    sl=entry+1.5;
  }

  document.getElementById("entry").innerText=entry.toFixed(2);
  document.getElementById("tp").innerText=tp.toFixed(2);
  document.getElementById("sl").innerText=sl.toFixed(2);
}

// ===== AUTO =====
function toggleAuto(){
  auto=!auto;
  document.getElementById("autoBtn").innerText =
    auto ? "AUTO ON" : "AUTO OFF";
}

// ===== CHANGE =====
document.getElementById("symbol").onchange=(e)=>{
  symbol=e.target.value;
  candles=[];
  prices=[];
  series.setData([]);
  connect();
};

// START
connect();

</script>

</body>
</html>
