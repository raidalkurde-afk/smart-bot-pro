<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PRO BOT PRO</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  background:#0a0f1c;
  color:white;
  font-family:Arial;
}

.container{padding:10px;}

h2{
  text-align:center;
  color:#00ff9d;
}

.top-bar{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

select,button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}

button{cursor:pointer;}

.buy{background:#00c853;}
.auto{background:#2979ff;}

#chart{
  height:350px;
}

.card{
  background:#111827;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 PRO BOT AI</h2>

<div class="top-bar">
<select id="symbol">
  <option value="R_100">R_100</option>
  <option value="R_75">R_75</option>
  <option value="R_50">R_50</option>
  <option value="R_25">R_25</option>
  <option value="R_10">R_10</option>

  <option value="BOOM1000">Boom 1000</option>
  <option value="BOOM500">Boom 500</option>
  <option value="CRASH1000">Crash 1000</option>
  <option value="CRASH500">Crash 500</option>
</select>

<button class="buy" onclick="analyze()">تحليل</button>
<button class="auto" onclick="toggleAuto()" id="autoBtn">AUTO OFF</button>
</div>

<div id="chart"></div>

<div class="card">Signal <span id="signal">--</span></div>
<div class="card">Entry <span id="entry">--</span></div>
<div class="card">TP <span id="tp">--</span></div>
<div class="card">SL <span id="sl">--</span></div>

</div>

<script>

// ===== SETTINGS =====
let symbol="R_100";
let ws=null;
let prices=[];
let candles=[];
let currentCandle=null;
let auto=false;

// ===== CHART =====
const chart = LightweightCharts.createChart(document.getElementById('chart'),{
  layout:{background:{color:"#0a0f1c"},textColor:"#aaa"},
  grid:{vertLines:{color:"#1f2937"},horzLines:{color:"#1f2937"}},
});

const series = chart.addCandlestickSeries({
  upColor:"#00e676",
  downColor:"#ff5252",
  borderUpColor:"#00e676",
  borderDownColor:"#ff5252",
  wickUpColor:"#00e676",
  wickDownColor:"#ff5252"
});

// ===== AI API =====
async function predict(price){
  let res = await fetch("https://smart-bot-pro.vercel.app/api/predict", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({price})
  });

  let data = await res.json();
  return data.prediction;
}

// ===== CONNECT =====
function connect(){

  if(ws){
    ws.onclose=null;
    ws.close();
  }

  ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>{
    ws.send(JSON.stringify({ticks:symbol}));
  };

  ws.onmessage=async (e)=>{
    let d=JSON.parse(e.data);
    if(!d.tick) return;

    let price=d.tick.quote;
    prices.push(price);

    if(prices.length>500) prices.shift();

    let t=Math.floor(Date.now()/60000);

    if(!currentCandle || currentCandle.time!==t){
      currentCandle={time:t,open:price,high:price,low:price,close:price};
      candles.push(currentCandle);
    }else{
      currentCandle.high=Math.max(currentCandle.high,price);
      currentCandle.low=Math.min(currentCandle.low,price);
      currentCandle.close=price;
    }

    if(candles.length>200) candles.shift();

    series.setData(candles);

    if(auto) analyze();
  };

  ws.onclose=()=>setTimeout(connect,2000);
}

// ===== CHANGE =====
document.getElementById("symbol").onchange=()=>{
  symbol=document.getElementById("symbol").value;
  prices=[];
  candles=[];
  currentCandle=null;
  series.setData([]);
  connect();
};

// ===== EMA =====
function EMA(p){
  if(prices.length<p) return null;

  let k=2/(p+1);
  let ema=prices[prices.length-p];

  for(let i=prices.length-p+1;i<prices.length;i++){
    ema=prices[i]k+ema(1-k);
  }
  return ema;
}

// ===== ANALYZE WITH AI =====
async function analyze(){

  if(prices.length<60) return;

  let ema20=EMA(20);
  let ema50=EMA(50);

  let last=prices.at(-1);
  let prev=prices.at(-3);

  let prediction = await predict(last);

  let signal="WAIT";

  if(ema20>ema50 && last>prev && prediction===1){
    signal="BUY 🚀";
  }
  else if(ema20<ema50 && last<prev && prediction===1){
    signal="SELL 🔻";
  }

  document.getElementById("signal").innerText=signal;

  if(signal==="WAIT") return;

  let entry=last;
  let sl = signal.includes("BUY") ? entry-2 : entry+2;
  let tp = signal.includes("BUY") ? entry+4 : entry-4;

  document.getElementById("entry").innerText=entry.toFixed(2);
  document.getElementById("tp").innerText=tp.toFixed(2);
  document.getElementById("sl").innerText=sl.toFixed(2);
}

// ===== AUTO =====
function toggleAuto(){
  auto=!auto;
  document.getElementById("autoBtn").innerText =
    auto ? "AUTO ON" : "AUTO OFF";
}

// START
connect();

</script>

</body>
</html>
