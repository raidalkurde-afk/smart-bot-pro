<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>VIP Trading Bot</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  padding:15px;
}

h2 {
  color:#22c55e;
  text-shadow:0 0 10px #22c55e;
}

canvas {
  background:#020617;
  border-radius:15px;
  margin-top:10px;
}

/* أزرار */
button {
  padding:12px;
  margin:5px;
  border:none;
  border-radius:12px;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

.start {
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

.auto {
  background:#3b82f6;
  box-shadow:0 0 10px #3b82f6;
}

button:hover {
  transform:scale(1.05);
}

/* كروت */
.card {
  background:rgba(255,255,255,0.05);
  padding:12px;
  margin:8px;
  border-radius:12px;
}

/* إشارات */
.buy { color:#22c55e; }
.sell { color:#ef4444; }

/* قوة الإشارة */
.bar {
  width:80%;
  height:10px;
  background:#111;
  margin:auto;
  border-radius:10px;
}

.fill {
  height:100%;
  width:0%;
  background:#22c55e;
  border-radius:10px;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 VIP Trading Bot</h2>

<canvas id="chart"></canvas>

<select id="symbol">
<option value="R_100">R_100</option>
<option value="BOOM1000">Boom 1000</option>
<option value="CRASH1000">Crash 1000</option>
</select>

<br>

<button class="start" onclick="start()">تشغيل</button>
<button class="auto" onclick="toggleAuto()">AUTO</button>

<div class="card">💰 Price: <span id="price">--</span></div>
<div class="card">📊 Signal: <span id="signal">--</span></div>

<div class="bar"><div id="strengthBar" class="fill"></div></div>

<div class="card">🎯 Entry: <span id="entry">--</span></div>
<div class="card">✅ TP: <span id="tp">--</span></div>
<div class="card">🛑 SL: <span id="sl">--</span></div>

</div>

<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let ws;
let prices=[];
let auto=false;

const ctx=document.getElementById('chart').getContext('2d');

const chart=new Chart(ctx,{
  type:'line',
  data:{
    labels:[],
    datasets:[{
      data:[],
      borderWidth:2
    }]
  }
});

function EMA(data,p){
  let k=2/(p+1), ema=data[0];
  for(let i=1;i<data.length;i++){
    ema=data[i]*k+ema*(1-k);
  }
  return ema;
}

function RSI(data){
  let g=0,l=0;
  for(let i=1;i<data.length;i++){
    let d=data[i]-data[i-1];
    if(d>0) g+=d; else l-=d;
  }
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function start(){
  ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>{
    let s=document.getElementById("symbol").value;
    ws.send(JSON.stringify({ticks:s}));
  };

  ws.onmessage=(msg)=>{
    let d=JSON.parse(msg.data);
    if(d.tick){
      let price=d.tick.quote;

      document.getElementById("price").innerText=price;

      prices.push(price);
      if(prices.length>50) prices.shift();

      chart.data.labels.push('');
      chart.data.datasets[0].data.push(price);

      if(chart.data.labels.length>50){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }

      chart.update();

      analyze(price);
    }
  };
}

function analyze(price){
  if(prices.length<20) return;

  let rsi=RSI(prices);
  let ema20=EMA(prices,20);
  let ema50=EMA(prices,50);

  let signal="WAIT";
  let strength=0;

  if(rsi<30 && price>ema20 && ema20>ema50){
    signal="BUY"; strength+=2;
  }

  if(rsi>70 && price<ema20 && ema20<ema50){
    signal="SELL"; strength+=2;
  }

  let last=prices[prices.length-2];
  if(Math.abs(price-last)>1.5){
    signal="SPIKE ⚡"; strength=5;
  }

  document.getElementById("signal").innerHTML=
    `<span class="${signal=='BUY'?'buy':'sell'}">${signal}</span>`;

  let percent=(strength/5)*100;
  document.getElementById("strengthBar").style.width=percent+"%";

  if(strength>=3){
    document.getElementById("alertSound").play();
  }

  if(signal==="BUY"||signal==="SELL"){
    let entry=price;
    let tp=signal==="BUY"?price+2:price-2;
    let sl=signal==="BUY"?price-1:price+1;

    document.getElementById("entry").innerText=entry;
    document.getElementById("tp").innerText=tp;
    document.getElementById("sl").innerText=sl;

    if(auto && strength>=4){
      console.log("AUTO TRADE:",signal);
    }
  }
}

function toggleAuto(){
  auto=!auto;
  alert("AUTO: "+(auto?"ON":"OFF"));
}
</script>

</body>
</html>
