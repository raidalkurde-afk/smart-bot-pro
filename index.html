<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PRO MAX AI BOT - جديد</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.0.6/dist/browser.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  padding-bottom:90px;
}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  color:#00ff9d;
}

#chart{height:320px;}

.panel{padding:10px;}

.card{
  background:#0f172a;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.bottom-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f172a;
  display:flex;
  gap:6px;
  padding:10px;
}

select,button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

.analyze{background:#00c853;}
.auto{background:#2979ff;}
</style>
</head>

<body>

<div class="header">🚀 PRO MAX AI BOT - نسخة جديدة</div>

<div id="chart"></div>

<div class="panel">
<div class="card">Signal <span id="signal">--</span></div>
<div class="card">RSI <span id="rsi">--</span></div>
<div class="card">Trend <span id="trend">--</span></div>
<div class="card">Entry <span id="entry">--</span></div>
<div class="card">TP <span id="tp">--</span></div>
<div class="card">SL <span id="sl">--</span></div>
</div>

<div class="bottom-bar">
<select id="symbol">
<option value="R_10">R_10</option>
<option value="R_25">R_25</option>
<option value="R_50">R_50</option>
<option value="R_75">R_75</option>
<option value="R_100">R_100</option>
<option value="BOOM500">Boom 500</option>
<option value="BOOM1000">Boom 1000</option>
<option value="CRASH500">Crash 500</option>
<option value="CRASH1000">Crash 1000</option>
</select>

<button class="analyze" onclick="analyze()">تحليل</button>
<button class="auto" onclick="toggleAuto()" id="autoBtn">AUTO ON</button>
</div>

<script>

// ===== STATE =====
let symbol="R_100";
let ws;
let candles=[];
let prices=[];
let auto=true;

// ===== CHART =====
const chart = LightweightCharts.createChart(document.getElementById('chart'),{
  layout:{background:{color:"#020617"},textColor:"#aaa"}
});
const series = chart.addCandlestickSeries();

// ===== CONNECT WEBSOCKET =====
function connect(){
  if(ws) ws.close();
  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen = ()=>{
    ws.send(JSON.stringify({ticks_history:symbol, style:"candles", granularity:60, count:100, end:"latest"}));
    ws.send(JSON.stringify({ohlc:symbol, granularity:60, subscribe:1}));
  };

  ws.onmessage = (e)=>{
    const data = JSON.parse(e.data);

    if(data.history){
      candles = data.history.times.map((t,i)=>({
        time:t,
        open:data.history.open[i],
        high:data.history.high[i],
        low:data.history.low[i],
        close:data.history.close[i]
      }));
      prices = candles.map(c=>c.close);
      series.setData(candles);
    }

    if(data.ohlc){
      const c = data.ohlc;
      const candle = {time:c.epoch, open:c.open, high:c.high, low:c.low, close:c.close};
      const last = candles.at(-1);
      if(last && last.time === candle.time) candles[candles.length-1]=candle;
      else candles.push(candle);
      series.update(candle);
      prices.push(candle.close);
      if(prices.length>200) prices.shift();
    }
  };

  ws.onclose = ()=>setTimeout(connect,2000);
}

// ===== INDICATORS =====
function getRSI(){
  if(prices.length<14) return null;
  const rsiValues = technicalindicators.RSI.calculate({values:prices, period:14});
  return rsiValues.at(-1);
}

function getEMA(period){
  if(prices.length<period) return null;
  const emaValues = technicalindicators.EMA.calculate({values:prices, period});
  return emaValues.at(-1);
}

function isSpike(){
  if(prices.length<10) return false;
  let lastMove = Math.abs(prices.at(-1)-prices.at(-2));
  let avgMove = prices.slice(-10).reduce((sum,p,i,arr)=>{
    if(i===0) return 0;
    return sum + Math.abs(p-arr[i-1]);
  },0)/9;
  return lastMove>avgMove*1.8;
}

function getSignal(rsi, ema20, ema50){
  let trend = "SIDE";
  if(ema20>ema50) trend="UP";
  else if(ema20<ema50) trend="DOWN";

  if(isSpike()) return {signal:"⚡ SPIKE قريب", trend};
  if(rsi<40 && trend==="UP") return {signal:"BUY 🚀", trend};
  if(rsi>60 && trend==="DOWN") return {signal:"SELL 🔻", trend};
  return {signal:"WAIT", trend};
}

// ===== ANALYZE & UPDATE UI =====
function analyze(){
  if(prices.length<20) return;
  const rsi = getRSI();
  const ema20 = getEMA(20);
  const ema50 = getEMA(50);
  const lastPrice = prices.at(-1);

  const signalData = getSignal(rsi, ema20, ema50);

  document.getElementById("rsi").innerText = rsi?rsi.toFixed(1):"--";
  document.getElementById("trend").innerText = signalData.trend;
  document.getElementById("signal").innerText = signalData.signal;

  if(signalData.signal!=="WAIT"){
    document.getElementById("entry").innerText = lastPrice.toFixed(2);
    document.getElementById("tp").innerText = (signalData.signal.includes("BUY")? lastPrice+2 : lastPrice-2).toFixed(2);
    document.getElementById("sl").innerText = (signalData.signal.includes("BUY")? lastPrice-1.5 : lastPrice+1.5).toFixed(2);
  }
}

// ===== AUTO ANALYSIS =====
setInterval(()=>{ if(auto) analyze(); },1000);
function toggleAuto(){
  auto=!auto;
  document.getElementById("autoBtn").innerText = auto?"AUTO ON":"AUTO OFF";
}

// ===== CHANGE SYMBOL =====
document.getElementById("symbol").onchange=(e)=>{
  symbol=e.target.value;
  candles=[];
  prices=[];
  series.setData([]);
  connect();
};

// START
connect();

</script>

</body>
</html>
