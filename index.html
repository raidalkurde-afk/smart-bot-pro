<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 AI Trading Bot PRO</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#020617,#000);
  color:white;
  font-family:Arial;
}

.container{
  padding:15px;
  text-align:center;
}

h2{
  color:#22c55e;
  text-shadow:0 0 20px #22c55e;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:15px;
  padding:12px;
  margin:8px;
  border:1px solid rgba(255,255,255,0.1);
}

#chart{
  height:320px;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.analyze{background:#22c55e;}
.auto{background:#3b82f6;}

select{
  padding:10px;
  border-radius:10px;
  margin:10px;
  background:#111;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 AI Smart Trading Bot</h2>

<select id="symbolSelect">
  <option value="R_100">R_100</option>
  <option value="R_50">R_50</option>
  <option value="R_25">R_25</option>
  <option value="R_10">R_10</option>
  <option value="BOOM1000">Boom 1000</option>
  <option value="BOOM500">Boom 500</option>
  <option value="CRASH1000">Crash 1000</option>
  <option value="CRASH500">Crash 500</option>
</select>

<div id="chart"></div>

<button class="analyze" onclick="analyze()">تحليل</button>
<button class="auto" onclick="toggleAuto()">AUTO</button>

<div class="card">📡 Radar: <span id="radar">--</span></div>
<div class="card">📊 Signal: <span id="signal">--</span></div>
<div class="card">🎯 Entry: <span id="entry">--</span></div>
<div class="card">💰 TP: <span id="tp">--</span></div>
<div class="card">🛑 SL: <span id="sl">--</span></div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

let symbol="R_100";
let ws=null;
let candles=[];
let prices=[];
let currentCandle=null;
let auto=false;
let interval=null;
let lastAlert=0;

// ===== CHART =====
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout:{background:{color:"#020617"},textColor:"#aaa"},
  grid:{vertLines:{color:"#111"},horzLines:{color:"#111"}}
});

const candleSeries = chart.addCandlestickSeries();

// ===== INDICATORS =====
function EMA(data,p){
  if(data.length===0) return 0;
  let k=2/(p+1), ema=data[0];
  for(let i=1;i<data.length;i++){
    ema=data[i]*k+ema*(1-k);
  }
  return ema;
}

function RSI(data,p=14){
  if(data.length<p+1) return 50;

  let g=0,l=0;
  for(let i=data.length-p;i<data.length;i++){
    let d=data[i]-data[i-1];
    if(d>0) g+=d; else l-=d;
  }

  let rs = l===0 ? 100 : g/l;
  return 100-(100/(1+rs));
}

function ATR(data){
  if(data.length<2) return 0;

  let s=0;
  for(let i=1;i<data.length;i++){
    s+=Math.abs(data[i]-data[i-1]);
  }
  return s/data.length;
}

// ===== STREAM =====
function startStream(){

  if(ws){
    ws.onclose=null;
    ws.close();
  }

  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>{
    ws.send(JSON.stringify({ticks:symbol}));
  };

  ws.onmessage=(msg)=>{
    let d=JSON.parse(msg.data);

    if(!d.tick) return;

    let price=d.tick.quote;
    prices.push(price);

    let time=Math.floor(Date.now()/5000);

    if(!currentCandle || currentCandle.time!==time){
      currentCandle={
        time:time,
        open:price,
        high:price,
        low:price,
        close:price
      };
      candles.push(currentCandle);
    }else{
      currentCandle.high=Math.max(currentCandle.high,price);
      currentCandle.low=Math.min(currentCandle.low,price);
      currentCandle.close=price;
    }

    if(candles.length>120){
      candles.shift();
      prices.shift();
    }

    candleSeries.setData(candles);
  };

  ws.onclose=()=>{
    setTimeout(startStream,2000);
  };
}

// ===== CHANGE SYMBOL =====
document.getElementById("symbolSelect").addEventListener("change",()=>{
  symbol = document.getElementById("symbolSelect").value;

  candles=[];
  prices=[];
  currentCandle=null;

  candleSeries.setData([]);

  startStream();
});

// ===== ANALYZE =====
function analyze(){

  if(prices.length<50) return;

  let rsi=RSI(prices);
  let ema20=EMA(prices,20);
  let ema50=EMA(prices,50);
  let atr=ATR(prices);

  let last=prices.at(-1);
  let prev=prices.at(-2);

  let momentum=Math.abs(last-prev);

  let radar="NORMAL";

  if(momentum>atr*1.5) radar="⚡ SPIKE";
  else if(rsi<25 || rsi>75) radar="🔥 REVERSAL";

  let signal="WAIT";

  if(rsi<30 && ema20>ema50 && momentum>atr){
    signal="BUY 🚀";
  }
  else if(rsi>70 && ema20<ema50 && momentum>atr){
    signal="SELL 💥";
  }

  document.getElementById("radar").innerText=radar;
  document.getElementById("signal").innerText=signal;

  if(signal==="WAIT") return;

  let entry = signal.includes("BUY") ? last-atr*0.5 : last+atr*0.5;
  let sl = signal.includes("BUY") ? entry-atr*2 : entry+atr*2;
  let tp = signal.includes("BUY") ? entry+atr*4 : entry-atr*4;

  document.getElementById("entry").innerText=entry.toFixed(2);
  document.getElementById("tp").innerText=tp.toFixed(2);
  document.getElementById("sl").innerText=sl.toFixed(2);

  // 🔔 صوت ذكي (كل 10 ثواني فقط)
  let now=Date.now();
  if(auto && now-lastAlert>10000){
    document.getElementById("sound").play();
    lastAlert=now;
  }
}

// ===== AUTO =====
function toggleAuto(){
  auto=!auto;

  if(auto){
    interval=setInterval(analyze,3000);
    alert("AUTO ON 🔔");
  }else{
    clearInterval(interval);
    alert("AUTO OFF");
  }
}

// START
startStream();

</script>

</body>
</html>
