<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Bot</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

canvas{
  background:#0f172a;
  border-radius:10px;
  margin:10px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.start{background:green;color:white;}
.auto{background:blue;color:white;}
</style>
</head>

<body>

<h2>🚀 Smart Bot</h2>

<canvas id="chart" height="200"></canvas>

<br>

<button class="start" onclick="start()">تشغيل</button>
<button class="auto" onclick="toggleAuto()">AUTO</button>

<h3 id="price">Price: --</h3>

<script>
let ws;
let prices=[];
let chart;

const ctx=document.getElementById("chart").getContext("2d");
chart=new Chart(ctx,{
  type:'line',
  data:{
    labels:[],
    datasets:[{data:[]}]
  },
  options:{animation:false}
});

function start(){
  ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>{
    ws.send(JSON.stringify({ticks:"R_100"}));
  };

  ws.onmessage=(msg)=>{
    let data=JSON.parse(msg.data);

    if(data.tick){
      let price=data.tick.quote;

      document.getElementById("price").innerText="Price: "+price;

      chart.data.labels.push('');
      chart.data.datasets[0].data.push(price);

      if(chart.data.labels.length>30){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }

      chart.update();
    }
  };
}

function toggleAuto(){
  alert("AUTO ON");
}
</script>

</body>
