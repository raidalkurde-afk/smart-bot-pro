<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PRO BOT AI</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  color:#00ff9d;
}

#chart{
  height:300px;
}

.panel{padding:10px;}

.card{
  background:#0f172a;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.bottom-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f172a;
  display:flex;
  gap:5px;
  padding:10px;
}

select,button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.analyze{background:#00c853;}
.auto{background:#2979ff;}
</style>
</head>

<body>

<div class="header">🚀 PRO BOT AI</div>

<div id="chart"></div>

<div class="panel">
<div class="card">Signal <span id="signal">--</span></div>
<div class="card">RSI <span id="rsi">--</span></div>
<div class="card">Entry <span id="entry">--</span></div>
<div class="card">TP <span id="tp">--</span></div>
<div class="card">SL <span id="sl">--</span></div>
</div>

<div class="bottom-bar">
<select id="symbol">
<option value="R_10">R_10</option>
<option value="R_25">R_25</option>
<option value="R_50">R_50</option>
<option value="R_75">R_75</option>
<option value="R_100">R_100</option>
<option value="BOOM500">Boom 500</option>
<option value="BOOM1000">Boom 1000</option>
<option value="CRASH500">Crash 500</option>
<option value="CRASH1000">Crash 1000</option>
</select>

<button class="analyze" onclick="analyze()">تحليل</button>
<button class="auto" onclick="toggleAuto()" id="autoBtn">AUTO ON</button>
</div>

<script>

// ===== STATE =====
let symbol="R_100";
let ws;
let prices=[];
let candles=[];
let currentCandle=null;
let auto=true;
let lastAnalysis=0;

// ===== CHART =====
const chart = LightweightCharts.createChart(document.getElementById('chart'),{
  layout:{background:{color:"#020617"},textColor:"#aaa"}
});
const series = chart.addCandlestickSeries();

// ===== CONNECT =====
function connect(){

  if(ws) ws.close();

  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    ws.send(JSON.stringify({ticks:symbol}));
  };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if(!d.tick) return;

    const price = d.tick.quote;
    prices.push(price);

    if(prices.length > 300) prices.shift();

    updateCandles(price);

    series.setData(candles);

    // 🔥 تقليل التحليل (كل 1 ثانية)
    if(auto && Date.now() - lastAnalysis > 1000){
      analyze();
      lastAnalysis = Date.now();
    }
  };

  ws.onclose = () => setTimeout(connect,2000);
}

// ===== CANDLES =====
function updateCandles(price){

  const t = Math.floor(Date.now()/60000);

  if(!currentCandle || currentCandle.time !== t){
    currentCandle = {time:t,open:price,high:price,low:price,close:price};
    candles.push(currentCandle);
  }else{
    currentCandle.high = Math.max(currentCandle.high,price);
    currentCandle.low  = Math.min(currentCandle.low,price);
    currentCandle.close = price;
  }

  if(candles.length > 150) candles.shift();
}

// ===== RSI (محترف) =====
function RSI(period=14){
  if(prices.length < period+1) return null;

  let gains = 0, losses = 0;

  for(let i = prices.length-period; i < prices.length; i++){
    const diff = prices[i] - prices[i-1];
    if(diff > 0) gains += diff;
    else losses -= diff;
  }

  const rs = gains / (losses || 1);
  return 100 - (100 / (1 + rs));
}

// ===== SPIKE SMART =====
function detectSpike(){

  if(prices.length < 20) return false;

  const last = prices.at(-1);
  const avg  = prices.slice(-20).reduce((a,b)=>a+b,0)/20;

  return Math.abs(last - avg) > (avg * 0.003); // ذكي %
}

// ===== ANALYZE =====
function analyze(){

  if(prices.length < 50) return;

  const rsi = RSI();
  const last = prices.at(-1);

  document.getElementById("rsi").innerText =
    rsi ? rsi.toFixed(1) : "--";

  let signal = "WAIT";

  if(detectSpike()){
    signal = "⚡ SPIKE قريب";
  }
  else if(rsi < 35){
    signal = "BUY 🚀";
  }
  else if(rsi > 65){
    signal = "SELL 🔻";
  }

  document.getElementById("signal").innerText = signal;

  if(signal === "WAIT") return;

  let entry = last;
  let tp = entry + 3;
  let sl = entry - 2;

  if(signal.includes("SELL")){
    tp = entry - 3;
    sl = entry + 2;
  }

  updateUI(entry,tp,sl);
}

// ===== UI =====
function updateUI(entry,tp,sl){
  document.getElementById("entry").innerText = entry.toFixed(2);
  document.getElementById("tp").innerText = tp.toFixed(2);
  document.getElementById("sl").innerText = sl.toFixed(2);
}

// ===== AUTO =====
function toggleAuto(){
  auto = !auto;
  document.getElementById("autoBtn").innerText =
    auto ? "AUTO ON" : "AUTO OFF";
}

// ===== CHANGE SYMBOL =====
document.getElementById("symbol").onchange = (e)=>{
  symbol = e.target.value;
  prices = [];
  candles = [];
  currentCandle = null;
  series.setData([]);
  connect();
};

// START
connect();

</script>

</body>
</html>
