<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 Pro Trading Bot</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
}

.container{
  padding:10px;
}

h2{
  text-align:center;
  color:#22c55e;
}

.top-bar{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

select,button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{cursor:pointer;}

.buy{background:#22c55e;}
.auto{background:#3b82f6;}

#chart{
  height:300px;
}

.card{
  background:#111827;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 PRO BOT</h2>

<div class="top-bar">
<select id="symbol">
  <option value="R_100">R_100</option>
  <option value="R_50">R_50</option>
  <option value="BOOM1000">Boom 1000</option>
  <option value="CRASH1000">Crash 1000</option>
</select>

<button class="buy" onclick="analyze()">تحليل</button>
<button class="auto" onclick="toggleAuto()" id="autoBtn">AUTO OFF</button>
</div>

<div id="chart"></div>

<div class="card">Signal <span id="signal">--</span></div>
<div class="card">Entry <span id="entry">--</span></div>
<div class="card">TP <span id="tp">--</span></div>
<div class="card">SL <span id="sl">--</span></div>

</div>

<script>

// ===== VARIABLES =====
let ws=null;
let prices=[];
let candle=null;
let symbol="R_100";
let auto=false;

// ===== CHART =====
const chart = LightweightCharts.createChart(document.getElementById('chart'),{
  layout:{background:{color:"#0b0f1a"},textColor:"#aaa"},
  grid:{vertLines:{color:"#111"},horzLines:{color:"#111"}}
});

const series = chart.addCandlestickSeries();

// ===== CONNECT =====
function connect(){

  if(ws){
    ws.onclose=null;
    ws.close();
  }

  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>{
    ws.send(JSON.stringify({ticks:symbol}));
  };

  ws.onmessage=(e)=>{
    let d=JSON.parse(e.data);
    if(!d.tick) return;

    let price=d.tick.quote;

    prices.push(price);

    // 🧹 حد البيانات
    if(prices.length>200) prices.shift();

    let t=Math.floor(Date.now()/5000);

    if(!candle || candle.time!==t){
      candle={
        time:t,
        open:price,
        high:price,
        low:price,
        close:price
      };
      series.update(candle);
    }else{
      candle.high=Math.max(candle.high,price);
      candle.low=Math.min(candle.low,price);
      candle.close=price;
      series.update(candle);
    }

    if(auto) analyze();
  };

  ws.onclose=()=>{
    setTimeout(connect,2000);
  };
}

// ===== CHANGE SYMBOL =====
document.getElementById("symbol").onchange=()=>{
  symbol=document.getElementById("symbol").value;

  prices=[];
  candle=null;
  series.setData([]);

  connect();
};

// ===== EMA =====
function EMA(period){
  if(prices.length<period) return null;

  let k=2/(period+1);
  let ema=prices[0];

  for(let i=1;i<prices.length;i++){
    ema = prices[i]*k + ema*(1-k);
  }

  return ema;
}

// ===== ANALYZE =====
function analyze(){

  if(prices.length<50) return;

  let ema20=EMA(20);
  let ema50=EMA(50);

  if(!ema20 || !ema50) return;

  let last=prices[prices.length-1];
  let prev=prices[prices.length-2];

  let signal="WAIT";

  if(ema20>ema50 && last>prev){
    signal="BUY";
  }
  else if(ema20<ema50 && last<prev){
    signal="SELL";
  }

  document.getElementById("signal").innerText=signal;

  if(signal==="WAIT") return;

  let entry=last;
  let sl = signal==="BUY" ? entry-1 : entry+1;
  let tp = signal==="BUY" ? entry+2 : entry-2;

  document.getElementById("entry").innerText=entry.toFixed(2);
  document.getElementById("tp").innerText=tp.toFixed(2);
  document.getElementById("sl").innerText=sl.toFixed(2);
}

// ===== AUTO =====
function toggleAuto(){
  auto=!auto;

  document.getElementById("autoBtn").innerText =
    auto ? "AUTO ON" : "AUTO OFF";
}

// START
connect();

</script>

</body>
</html>
